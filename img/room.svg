<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360" role="img" aria-label="Ремонт комнаты в квартире">
  <defs>
    <linearGradient id="rwall" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f3f6fc"/><stop offset="1" stop-color="#e6edfa"/></linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#rwall)"/>
  <rect y="296" width="640" height="64" fill="#d9c3a6"/>
  <rect y="292" width="640" height="6" fill="#c9ad8a"/>
  <!-- bed -->
  <rect x="70" y="150" width="120" height="150" rx="10" fill="#2d2eaf"/>
  <rect x="60" y="150" width="320" height="60" rx="14" fill="#3a3bc4"/>
  <rect x="60" y="205" width="320" height="95" rx="10" fill="#e7eefb"/>
  <rect x="80" y="170" width="90" height="46" rx="10" fill="#ffffff"/>
  <rect x="180" y="170" width="90" height="46" rx="10" fill="#ffc945"/>
  <rect x="60" y="270" width="320" height="34" rx="8" fill="#ff8120" opacity=".8"/>
  <!-- nightstand + lamp -->
  <rect x="390" y="240" width="60" height="60" rx="6" fill="#c8915a"/>
  <rect x="408" y="200" width="6" height="40" fill="#7a8aa0"/>
  <path d="M396 200 h36 l-8 -22 h-20 z" fill="#ffc945"/>
  <!-- window -->
  <rect x="470" y="70" width="120" height="150" rx="6" fill="#cfeaff" stroke="#cdd9ea" stroke-width="4"/>
  <line x1="530" y1="70" x2="530" y2="220" stroke="#cdd9ea" stroke-width="4"/>
  <line x1="470" y1="145" x2="590" y2="145" stroke="#cdd9ea" stroke-width="4"/>
  <!-- wall art -->
  <rect x="150" y="60" width="70" height="60" rx="4" fill="#fff" stroke="#cdd9ea" stroke-width="3"/>
  <rect x="235" y="60" width="50" height="60" rx="4" fill="#fff" stroke="#cdd9ea" stroke-width="3"/>
  <circle cx="185" cy="90" r="14" fill="#0087ca"/>
