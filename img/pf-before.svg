<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 360" width="320" height="360" role="img" aria-label="Квартира до ремонта">
  <rect width="320" height="360" fill="#cfd3d9"/>
  <rect width="320" height="360" fill="#c4c8cf"/>
  <!-- bare wall patches -->
  <g fill="#b6bbc3"><rect x="20" y="30" width="90" height="120"/><rect x="150" y="60" width="70" height="90"/><rect x="240" y="20" width="60" height="150"/></g>
  <g fill="#d7dbe0" opacity=".7"><rect x="115" y="20" width="30" height="120"/><rect x="50" y="160" width="120" height="40"/></g>
  <!-- floor -->
  <rect y="280" width="320" height="80" fill="#9aa0a8"/>
  <rect y="276" width="320" height="6" fill="#878d96"/>
  <!-- exposed wiring -->
  <path d="M60 30 q10 40 -6 70 q-14 26 4 60" fill="none" stroke="#e0863a" stroke-width="4"/>
  <path d="M64 30 q10 40 -6 70 q-14 26 4 60" fill="none" stroke="#3a4673" stroke-width="3" opacity=".6"/>
  <circle cx="58" cy="30" r="7" fill="#7a8088"/>
  <!-- window unfinished -->
  <rect x="230" y="60" width="70" height="100" fill="#aeb4bc" stroke="#878d96" stroke-width="5"/>
  <line x1="265" y1="60" x2="265" y2="160" stroke="#878d96" stroke-width="4"/>
  <!-- ladder -->
  <g stroke="#b9772f" stroke-width="7" stroke-linecap="round">
    <line x1="120" y1="180" x2="100" y2="300"/><line x1="160" y1="180" x2="180" y2="300"/>
    <line x1="116" y1="210" x2="156" y2="210"/><line x1="110" y1="245" x2="166" y2="245"/><line x1="104" y1="280" x2="174" y2="280"/>
  </g>
  <!-- paint bucket -->
  <rect x="200" y="250" width="50" height="46" rx="4" fill="#7a8088"/>
  <rect x="200" y="246" width="50" height="10" rx="3" fill="#5f656d"/>
  <path d="M205 246 q20 -22 40 0" fill="none" stroke="#5f656d" stroke-width="4"/>
  <rect x="218" y="256" width="14" height="34" fill="#eef1f4"/>
  <!-- dust / rubble -->
  <path d="M40 300 q20 -16 44 0 q22 14 40 0 v6 H40z" fill="#878d96"/>
  <circle cx="270" cy="300" r="10" fill="#878d96"/>
</svg>
